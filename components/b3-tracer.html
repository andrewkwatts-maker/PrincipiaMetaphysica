<!--
    Walk-to-b3 modal template (Sprint 6.5).

    This file is reference-only — the live modal is generated by
    js/pm-b3-tracer.js on first invocation of window.PMTraceToB3().
    Drop the snippet below into a page if you want to pre-render the
    modal shell (e.g. for SSR-friendly progressive enhancement).

    Required:
      - css/pm-b3-tracer.css
      - js/pm-b3-tracer.js
      - AutoGenerated/dependency_chains.json
      - AutoGenerated/eml_dependency_chains.json
-->
<div class="pm-b3-modal" role="dialog" aria-modal="true" aria-labelledby="pm-b3-modal-title">
    <div class="pm-b3-modal__overlay" data-pm-b3-close="1"></div>
    <div class="pm-b3-modal__panel">
        <div class="pm-b3-modal__header">
            <div>
                <h2 class="pm-b3-modal__title" id="pm-b3-modal-title">
                    Trace to b<sub>3</sub>
                </h2>
                <p class="pm-b3-modal__subtitle" data-pm-b3-subtitle></p>
            </div>
            <button type="button"
                    class="pm-b3-modal__close"
                    aria-label="Close"
                    data-pm-b3-close="1">&times;</button>
        </div>

        <div class="pm-b3-modal__body">
            <div class="pm-b3-cols">
                <div class="pm-b3-col" data-pm-b3-col="arithma">
                    <div class="pm-b3-col__head">
                        <h3 class="pm-b3-col__title">Arithma (symbolic)</h3>
                        <span class="pm-b3-col__meta" data-pm-b3-meta="arithma"></span>
                    </div>
                    <svg class="pm-b3-col__svg"
                         data-pm-b3-svg="arithma"
                         preserveAspectRatio="xMidYMin meet"></svg>
                </div>
                <div class="pm-b3-col" data-pm-b3-col="eml">
                    <div class="pm-b3-col__head">
                        <h3 class="pm-b3-col__title">EML (op-token)</h3>
                        <span class="pm-b3-col__meta" data-pm-b3-meta="eml"></span>
                    </div>
                    <svg class="pm-b3-col__svg"
                         data-pm-b3-svg="eml"
                         preserveAspectRatio="xMidYMin meet"></svg>
                </div>
            </div>
        </div>

        <div class="pm-b3-modal__footer" data-pm-b3-footer></div>
    </div>
</div>
